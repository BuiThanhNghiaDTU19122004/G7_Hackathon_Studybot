version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  command: uvicorn src.app:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: CORS_ORIGINS
      value: "*"
    # Bạn sẽ cấu hình OPENAI_API_KEY và các biến bảo mật khác trên AWS Console
