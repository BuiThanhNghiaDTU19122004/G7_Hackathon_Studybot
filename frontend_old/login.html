<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập — StudyBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #6366f1;          
    --accent-light: rgba(99, 102, 241, 0.15);
    --bg: #0f172a;             
    --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    --card: rgba(30, 41, 59, 0.6); 
    --text: #f8fafc;           
    --muted: #94a3b8;          
    --border: rgba(255, 255, 255, 0.15);
    --input-bg: rgba(0, 0, 0, 0.3);
    --input-focus: rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
    --radius: 16px;
    --glow-opacity: 1;
  }
  [data-theme="light"] {
    --bg: #f8fafc;
    --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    --card: rgba(255, 255, 255, 0.8);
    --text: #0f172a;
    --muted: #64748b;
    --border: rgba(0, 0, 0, 0.1);
    --input-bg: rgba(255, 255, 255, 1);
    --input-focus: #ffffff;
    --shadow-lg: 0 10px 30px -10px rgba(15, 23, 42, .15);
    --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.2);
    --glow-opacity: 0.6;
  }
  
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    background: var(--bg-gradient);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  
  body::before { content: ''; position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; z-index: -1; pointer-events: none; opacity: var(--glow-opacity); }
  body::after { content: ''; position: fixed; bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, rgba(0,0,0,0) 70%); border-radius: 50%; z-index: -1; pointer-events: none; opacity: var(--glow-opacity); }

  .auth-card {
    background: var(--card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    animation: fadeIn 0.4s ease-out;
  }
  
  .auth-header { text-align: center; margin-bottom: 2rem; }
  .logo { width: 48px; height: 48px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border-radius: 14px; display: inline-grid; place-items: center; box-shadow: var(--shadow-glow); margin-bottom: 1rem; }
  .auth-header h1 { margin: 0 0 0.5rem; font-size: 1.8rem; font-weight: 600; }
  .auth-header p { margin: 0; color: var(--muted); font-size: 0.95rem; }

  .form-group { margin-bottom: 1.25rem; }
  .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 500; color: var(--muted); }
  .form-control {
    width: 100%; padding: 0.8rem 1rem; border-radius: 8px;
    border: 1px solid var(--border); background: var(--input-bg);
    color: var(--text); font-family: inherit; font-size: 1rem;
    transition: all 0.2s;
  }
  .form-control:focus { outline: none; border-color: var(--accent); background: var(--input-focus); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25); }
  
  .btn-primary {
    width: 100%; padding: 0.85rem; border-radius: 8px; border: none;
    background: linear-gradient(135deg, #6366f1, #4f46e5); color: white;
    font-size: 1rem; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: all 0.2s;
    margin-top: 1rem; box-shadow: 0 4px 12px rgba(99,102,241,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99,102,241,0.4); }
  
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }
  
  .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; text-align: center; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
<script>
  const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</head>
<body>

<div class="auth-card">
  <div class="auth-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
        <path d="M12 6.5l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5z"></path>
      </svg>
    </div>
    <h1>Mừng trở lại!</h1>
    <p>Đăng nhập vào StudyBot để tiếp tục học</p>
  </div>
  
  <form id="login-form">
    <div class="form-group">
      <label for="username">Tên đăng nhập</label>
      <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập của bạn" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" required>
    </div>
    <div class="error-msg" id="error-msg">Tên đăng nhập hoặc mật khẩu không đúng</div>
    <button type="submit" class="btn-primary">Đăng nhập</button>
  </form>
  
  <div class="auth-footer">
    Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    
    if (user && pass) {
      // Giả lập lưu phiên đăng nhập
      localStorage.setItem('studybot_user', user);
      window.location.href = '/index.html';
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  });
</script>

</body>
</html>
