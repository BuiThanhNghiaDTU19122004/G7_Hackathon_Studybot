<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyBot — AI Study Buddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tích hợp Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ---------- Design tokens ---------- */
    :root {
      --accent: #6366f1;
      --accent-light: rgba(99, 102, 241, 0.15);
      --accent-dark: #4338ca;
      --accent-glow: rgba(99, 102, 241, 0.5);

      /* Dark Theme */
      --bg: #0f172a;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card: rgba(30, 41, 59, 0.6);
      --card-border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.15);
      --topbar-bg: rgba(15, 23, 42, 0.7);
      --sidebar-bg: rgba(15, 23, 42, 0.8);
      --sidebar-hover: rgba(255, 255, 255, 0.05);
      --drop-bg: rgba(0, 0, 0, 0.2);
      --input-bg: rgba(0, 0, 0, 0.3);
      --input-focus: rgba(0, 0, 0, 0.5);
      --input-placeholder: rgba(255, 255, 255, 0.3);
      --ghost-btn-bg: rgba(255, 255, 255, 0.05);
      --ghost-btn-hover: rgba(255, 255, 255, 0.1);
      --ghost-btn-border: rgba(255, 255, 255, 0.3);
      --answer-bg: rgba(0, 0, 0, 0.2);
      --citation-bg: rgba(255, 255, 255, 0.03);
      --doc-bg: rgba(0, 0, 0, 0.2);
      --toast-bg: rgba(30, 41, 59, 0.95);
      --pre-bg: rgba(0, 0, 0, 0.4);
      --pre-text: #cbd5e1;
      --empty-bg: rgba(0, 0, 0, 0.1);
      --spinner-bg: rgba(255, 255, 255, 0.2);
      --glow-opacity: 1;

      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
      --radius: 16px;
      --radius-sm: 10px;
      --success: #10b981;
      --warn: #f59e0b;
      --error: #ef4444;
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --card: rgba(255, 255, 255, 0.8);
      --card-border: rgba(0, 0, 0, 0.05);
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(0, 0, 0, 0.1);
      --topbar-bg: rgba(255, 255, 255, 0.85);
      --sidebar-bg: rgba(255, 255, 255, 0.85);
      --sidebar-hover: rgba(0, 0, 0, 0.05);
      --drop-bg: rgba(255, 255, 255, 0.5);
      --input-bg: rgba(255, 255, 255, 1);
      --input-focus: #ffffff;
      --input-placeholder: rgba(0, 0, 0, 0.3);
      --ghost-btn-bg: transparent;
      --ghost-btn-hover: rgba(0, 0, 0, 0.05);
      --ghost-btn-border: rgba(0, 0, 0, 0.1);
      --answer-bg: rgba(255, 255, 255, 0.6);
      --citation-bg: rgba(255, 255, 255, 1);
      --doc-bg: rgba(255, 255, 255, 0.6);
      --toast-bg: rgba(255, 255, 255, 0.95);
      --pre-bg: rgba(241, 245, 249, 1);
      --pre-text: #334155;
      --empty-bg: rgba(255, 255, 255, 0.4);
      --spinner-bg: rgba(0, 0, 0, 0.1);
      --glow-opacity: 0.6;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
      --shadow: 0 1px 3px rgba(15, 23, 42, .08), 0 1px 2px rgba(15, 23, 42, .04);
      --shadow-lg: 0 10px 30px -10px rgba(15, 23, 42, .15);
      --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.2);
    }

    /* ---------- Reset ---------- */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg-gradient);
      background-attachment: fixed;
      min-height: 100vh;
      transition: background 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
      opacity: var(--glow-opacity);
      transition: opacity 0.4s ease;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
      opacity: var(--glow-opacity);
      transition: opacity 0.4s ease;
    }

    /* ---------- App Layout ---------- */
    .app-wrapper {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---------- Sidebar ---------- */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      position: relative;
      height: 100vh;
      background: var(--sidebar-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-right: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s ease;
      z-index: 100;
    }

    .sidebar-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .sidebar-header .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-glow);
    }

    .sidebar-header h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .new-chat-btn {
      width: calc(100% - 2.5rem);
      margin: 1.25rem auto;
      font-weight: 500;
    }

    .sidebar-section {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
    }

    .section-title {
      padding: 0 1.25rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar-list {
      padding: 0 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 250px;
      overflow-y: auto;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      max-height: none;
      padding-bottom: 1.25rem;
    }

    .history-item,
    .sidebar-doc-item {
      padding: 0.6rem 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.2s ease, opacity 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text);
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .sidebar-doc-item {
      opacity: 0.9;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      background: var(--ghost-btn-bg);
    }

    .history-item:hover,
    .sidebar-doc-item:hover {
      background: var(--sidebar-hover);
      opacity: 1;
    }

    .history-item.active {
      background: var(--accent-light);
      color: var(--accent);
      opacity: 1;
      font-weight: 500;
    }

    .history-item svg,
    .sidebar-doc-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .history-item-text,
    .sidebar-doc-item-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---------- Main Content ---------- */
    .main-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .topbar {
      background: var(--topbar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      color: var(--text);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      z-index: 50;
    }

    .menu-toggle {
      display: none;
      background: transparent;
      border: none;
      color: var(--text);
      padding: 0.5rem;
      cursor: pointer;
      border-radius: var(--radius-sm);
    }

    .menu-toggle:hover {
      background: var(--ghost-btn-hover);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .topbar-left p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 400;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Pilled status */
    .status-pills {
      display: flex;
      gap: 0.5rem;
    }

    .pill {
      background: var(--ghost-btn-bg);
      border: 1px solid var(--border);
      padding: 0.35rem 0.75rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text);
    }

    /* Upload Banner in Main */
    .top-upload-banner {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      z-index: 40;
    }

    .drop-compact {
      flex: 1;
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 1rem;
      text-align: center;
      cursor: pointer;
      background: var(--drop-bg);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.85rem;
      max-width: 500px;
    }

    .drop-compact:hover,
    .drop-compact.dragover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    /* ---------- Chat Area ---------- */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    .welcome-state {
      margin: auto;
      text-align: center;
      max-width: 600px;
      padding: 2rem;
      animation: fadeIn 0.5s ease-out;
    }

    .welcome-state h2 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
    }

    .welcome-state p {
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-size: 1.05rem;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .chip {
      padding: 0.75rem 1.25rem;
      border-radius: 100px;
      background: var(--ghost-btn-bg);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .chip:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .message {
      display: flex;
      gap: 1rem;
      max-width: 85%;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .user .avatar {
      background: var(--accent);
      color: white;
    }

    .bot .avatar {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      box-shadow: var(--shadow-glow);
    }

    .bubble {
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .user .bubble {
      background: var(--accent);
      color: white;
      border-top-right-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .bot .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      width: 100%;
      overflow-x: hidden;
    }

    /* Markdown styling */
    .bot .bubble p:first-child {
      margin-top: 0;
    }

    .bot .bubble p:last-child {
      margin-bottom: 0;
    }

    .bot .bubble pre {
      background: var(--pre-bg);
      color: var(--pre-text);
      padding: 1rem;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      border: 1px solid var(--border);
      margin: 1rem 0;
    }

    .bot .bubble code {
      font-family: ui-monospace, Menlo, monospace;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
      font-size: 0.85em;
    }

    [data-theme="light"] .bot .bubble code {
      background: rgba(0, 0, 0, 0.05);
    }

    .bot .bubble pre code {
      background: transparent;
      padding: 0;
    }

    .bot .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9em;
    }

    .bot .bubble th,
    .bot .bubble td {
      border: 1px solid var(--border);
      padding: 0.5rem;
      text-align: left;
    }

    .bot .bubble th {
      background: var(--ghost-btn-bg);
    }

    .citations-block {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border);
    }

    .citation {
      font-size: 0.85rem;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 0.5rem;
      background: var(--citation-bg);
      transition: border-color 0.2s;
    }

    .citation:hover {
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* Chat Input Area */
    .input-area {
      padding: 1rem 1.5rem 2rem;
      background: var(--topbar-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      z-index: 10;
    }

    .input-container {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      display: flex;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 1.2rem 4.5rem 1.2rem 1.5rem;
      border-radius: 2rem;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 1rem;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
      background: var(--input-focus);
    }

    .send-btn {
      position: absolute;
      right: 0.5rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    .send-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Misc */
    button {
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.75rem 1.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
    }

    button.primary:hover {
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      transform: translateY(-1px);
    }

    .theme-toggle-btn {
      padding: 0.4rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text);
    }

    .theme-toggle-btn:hover {
      background: var(--ghost-btn-hover);
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--spinner-bg);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toasts */
    .toasts {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
      display: grid;
      gap: 0.75rem;
    }

    .toast {
      background: var(--toast-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow-lg);
      font-size: 0.95rem;
      color: var(--text);
      animation: slidein 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toast.success {
      border-left-color: var(--success);
    }

    .toast.error {
      border-left-color: var(--error);
    }

    @keyframes slidein {
      from {
        transform: translateX(120%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Sidebar Overlay for mobile */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 90;
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar.open~.sidebar-overlay {
        display: block;
        opacity: 1;
      }

      .menu-toggle {
        display: block;
      }

      .topbar-left p {
        display: none;
      }

      .top-upload-banner {
        flex-direction: column;
        align-items: stretch;
      }

      .message {
        max-width: 95%;
      }
    }
  </style>
  <script>
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>

<body>

  <div class="app-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
            <path d="M12 6.5l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5z"></path>
          </svg>
        </div>
        <h1>StudyBot</h1>
      </div>

      <button class="primary new-chat-btn" onclick="newChat()">
        <svg style="width:18px;height:18px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        Chat Mới
      </button>

      <div class="sidebar-section">
        <div class="section-title">Tài liệu của bạn</div>
        <div class="sidebar-list" id="sidebar-docs">
          <div class="muted" style="font-size:0.8rem; padding:0.5rem 0;">Chưa có tài liệu</div>
        </div>
      </div>

      <div class="sidebar-section" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
        <div class="section-title">Lịch sử Chat</div>
        <div class="history-list" id="history-list">
          <!-- History items will be injected here -->
        </div>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <div class="main-content">

      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle Menu">
            <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <p>AI Study Buddy — Trợ lý học tập thông minh</p>
        </div>

        <div class="top-actions">
          <div class="status-pills" id="status-pills">
            <span class="pill"><span class="spinner"></span> đang tải…</span>
          </div>
          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme" onclick="toggleTheme()">
            <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="sun-icon" style="display:none" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </header>

      <div class="top-upload-banner">
        <div style="font-weight: 500; display:flex; align-items:center; gap:0.5rem; color:var(--text);">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
          </svg>
          Tải tài liệu lên
        </div>
        <label class="drop-compact" id="drop">
          <span style="display:flex; align-items:center; gap:0.5rem;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 7.5m0 0L7.5 12M12 7.5v9" />
            </svg>
            Kéo thả hoặc <strong>bấm vào đây</strong> (.pdf, .txt, .md)
          </span>
          <input type="file" id="file" accept=".pdf,.txt,.md" style="display:none">
        </label>
        <div id="upload-status" style="font-size:0.85rem; color:var(--accent); min-width: 150px; text-align:right;">
        </div>
      </div>

      <!-- Chat Area -->
      <div class="chat-area" id="chat-messages">
        <div class="welcome-state" id="welcome-state">
          <h2>Hôm nay bạn muốn học gì?</h2>
          <p>Tải lên tài liệu PDF, TXT hoặc Markdown ở trên, sau đó bắt đầu hỏi StudyBot.</p>
          <div class="suggestion-chips">
            <div class="chip" onclick="setQuery('Tóm tắt tài liệu này')"><svg width="16" height="16" fill="none"
                stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                </path>
              </svg> Tóm tắt tài liệu</div>
            <div class="chip" onclick="setQuery('Các khái niệm chính là gì?')"><svg width="16" height="16" fill="none"
                stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
                </path>
              </svg> Khái niệm chính</div>
            <div class="chip" onclick="setQuery('Tạo 3 câu hỏi trắc nghiệm từ nội dung này')"><svg width="16"
                height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="12" cy="12" r="6"></circle>
                <circle cx="12" cy="12" r="2"></circle>
              </svg> Tạo trắc nghiệm</div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <input type="text" id="question" class="chat-input" placeholder="Hỏi StudyBot bất cứ điều gì..."
            autocomplete="off">
          <button class="send-btn" id="ask-btn" onclick="ask()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
              style="margin-left:-2px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
            </svg>
          </button>
        </div>
      </div>

    </div> <!-- End Main Content -->
  </div> <!-- End App Wrapper -->

  <div class="toasts" id="toasts"></div>

  <script>
    // ============================================================================
    // Core Logic
    // ============================================================================
    const API_BASE = (window.API_BASE || new URLSearchParams(location.search).get('api') || '').replace(/\/$/, '');
    const USER_ID = (new URLSearchParams(location.search).get('user') || 'test-user-001');

    function $(id) { return document.getElementById(id); }

    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      let icon = type === 'success'
        ? '<svg width="20" height="20" fill="none" stroke="var(--success)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
        : type === 'error'
          ? '<svg width="20" height="20" fill="none" stroke="var(--error)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
          : type === 'warn'
            ? '<svg width="20" height="20" fill="none" stroke="var(--warn)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>'
            : '<svg width="20" height="20" fill="none" stroke="var(--accent)" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
      el.innerHTML = `<span style="display:flex;">${icon}</span> <div style="flex:1;">${msg}</div>`;
      $('toasts').appendChild(el);
      setTimeout(() => el.style.opacity = '0', 2500);
      setTimeout(() => el.remove(), 2800);
    }

    async function call(path, opts = {}) {
      opts.headers = Object.assign({ 'X-User-Id': USER_ID }, opts.headers || {});
      const r = await fetch(API_BASE + path, opts);
      const text = await r.text();
      let body;
      try { body = JSON.parse(text); } catch { body = text; }
      return { ok: r.ok, status: r.status, body };
    }

    async function loadStatus() {
      const res = await call('/health');
      if (!res.ok) {
        $('status-pills').innerHTML = '<span class="pill error">offline</span>';
        return;
      }
      $('status-pills').innerHTML = Object.entries(res.body.backends)
        .map(([k, v]) => `<span class="pill ${v === 'local' ? 'local' : 'remote'}">${k}: ${v}</span>`)
        .join('');
    }

    // ============================================================================
    // Sidebar / Chat History
    // ============================================================================
    let chatHistory = JSON.parse(localStorage.getItem('studybot_history') || '[]');

    function toggleSidebar() { $('sidebar').classList.toggle('open'); }
    function saveHistory() { localStorage.setItem('studybot_history', JSON.stringify(chatHistory)); }

    function renderHistory() {
      const list = $('history-list');
      if (chatHistory.length === 0) {
        list.innerHTML = '<div class="muted" style="text-align:center; font-size:0.85rem; padding:1rem 0;">Chưa có lịch sử</div>';
        return;
      }
      list.innerHTML = chatHistory.map((q, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      <div class="history-item-text">${q}</div>
    </div>
  `).join('');
    }

    function loadHistory(index) {
      $('question').value = chatHistory[index];
      if (window.innerWidth <= 768) toggleSidebar();
    }

    function addHistoryItem(q) {
      if (chatHistory.length > 0 && chatHistory[0] === q) return;
      chatHistory.unshift(q);
      if (chatHistory.length > 20) chatHistory.pop();
      saveHistory();
      renderHistory();
    }

    function newChat() {
      $('chat-messages').innerHTML = `
    <div class="welcome-state" id="welcome-state">
      <h2>Hôm nay bạn muốn học gì?</h2>
      <p>Tải lên tài liệu PDF, TXT hoặc Markdown ở trên, sau đó bắt đầu hỏi StudyBot.</p>
      <div class="suggestion-chips">
        <div class="chip" onclick="setQuery('Tóm tắt tài liệu này')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg> Tóm tắt tài liệu</div>
        <div class="chip" onclick="setQuery('Các khái niệm chính là gì?')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg> Khái niệm chính</div>
        <div class="chip" onclick="setQuery('Tạo 3 câu hỏi trắc nghiệm từ nội dung này')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg> Tạo trắc nghiệm</div>
      </div>
    </div>
  `;
      if (window.innerWidth <= 768) toggleSidebar();
    }

    function setQuery(q) {
      $('question').value = q;
      ask();
    }

    document.addEventListener('DOMContentLoaded', renderHistory);

    // ============================================================================
    // Theme Toggle
    // ============================================================================
    function updateThemeIcon() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      $('moon-icon').style.display = isLight ? 'block' : 'none';
      $('sun-icon').style.display = isLight ? 'none' : 'block';
    }

    function toggleTheme() {
      const nextTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', nextTheme);
      localStorage.setItem('theme', nextTheme);
      updateThemeIcon();
    }
    document.addEventListener('DOMContentLoaded', updateThemeIcon);

    // ============================================================================
    // Upload & Documents
    // ============================================================================
    const drop = $('drop');
    const fileInput = $('file');

    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) doUpload(e.target.files[0]); });

    async function doUpload(file) {
      $('upload-status').innerHTML = `<span class="spinner" style="width:12px;height:12px;"></span> Đang xử lý...`;
      const fd = new FormData();
      fd.append('file', file);
      const res = await call('/upload', { method: 'POST', body: fd });
      if (!res.ok) {
        toast(`Upload failed: ${res.body.detail || res.status}`, 'error');
        $('upload-status').innerHTML = `<span style="color:var(--error); display:flex; align-items:center; justify-content:flex-end; gap:0.25rem;"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Lỗi tải lên</span>`;
        return;
      }
      const b = res.body;
      toast(`Tải lên thành công: ${b.filename}`, 'success');
      $('upload-status').innerHTML = `<span style="color:var(--success); display:flex; align-items:center; justify-content:flex-end; gap:0.25rem;"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${b.filename}</span>`;
      refreshDocs();
    }

    async function refreshDocs() {
      const res = await call('/docs/list');
      if (!res.ok || !res.body.docs || !res.body.docs.length) {
        $('sidebar-docs').innerHTML = '<div class="muted" style="font-size:0.8rem; padding:0.5rem 0;">Chưa có tài liệu</div>';
        return;
      }
      $('sidebar-docs').innerHTML = res.body.docs.map(d => `
    <div class="sidebar-doc-item" title="${d.filename || d.doc_id}">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      <div class="sidebar-doc-item-text">${d.filename || d.doc_id}</div>
    </div>
  `).join('');
    }

    // ============================================================================
    // Chat / Ask
    // ============================================================================
    function addMessage(text, isUser = true) {
      const welcome = $('welcome-state');
      if (welcome) welcome.style.display = 'none';

      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isUser ? 'user' : 'bot'}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.innerHTML = isUser
        ? '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>'
        : '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.5l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5z"></path></svg>';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (isUser) {
        bubble.textContent = text;
      } else {
        bubble.innerHTML = text;
      }

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      $('chat-messages').appendChild(msgDiv);
      $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
      return bubble;
    }

    async function ask() {
      const q = $('question').value.trim();
      if (!q) { toast('Vui lòng nhập câu hỏi', 'warn'); return; }

      $('question').value = '';
      addHistoryItem(q);
      addMessage(q, true);

      $('ask-btn').disabled = true;
      const bubble = addMessage('<span class="spinner"></span> Đang suy nghĩ...', false);

      const res = await call('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });

      $('ask-btn').disabled = false;
      $('question').focus();

      if (!res.ok) {
        bubble.innerHTML = `<span style="color:var(--error); display:flex; align-items:center; gap:0.5rem;"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Lỗi: ${res.body.detail || 'Không thể kết nối'}</span>`;
        return;
      }

      // Render Markdown
      let finalHtml = marked.parse(res.body.answer);

      // Render Citations
      const c = res.body.citations || [];
      if (c.length) {
        finalHtml += `
      <div class="citations-block">
        <div style="font-size:0.8rem; color:var(--muted); margin-bottom:0.5rem;">📎 Nguồn tham khảo:</div>
        ${c.map(x => `
          <div class="citation">
             <div style="color:var(--accent); font-family:monospace; margin-bottom:0.2rem;">Chunk ${x.chunk} (Score: ${(x.score || 0).toFixed(1)})</div>
             <div style="opacity:0.85; line-height:1.5;">${(x.text || '').replace(/</g, '&lt;')}</div>
          </div>
        `).join('')}
      </div>
    `;
      }

      // Render Action buttons
      const rawAnswer = res.body.answer.replace(/"/g, '&quot;').replace(/`/g, '\\`').replace(/\n/g, '\\n');
      finalHtml += `
    <div style="margin-top:0.75rem; display:flex; gap:0.5rem;">
      <button style="background:var(--ghost-btn-bg); border:1px solid var(--border); border-radius:4px; color:var(--text); cursor:pointer; padding:0.25rem 0.5rem; font-size:0.8rem; display:flex; align-items:center; gap:0.25rem;" onclick="navigator.clipboard.writeText(\`${rawAnswer}\`); toast('Đã sao chép!', 'success');" title="Sao chép">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
        Copy
      </button>
    </div>
  `;

      bubble.innerHTML = finalHtml;
      $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
    }

    $('question').addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

    // ============================================================================
    // Boot
    // ============================================================================
    loadStatus();
    refreshDocs();
  </script>
</body>

</html>
